[package]
name = "folding-schemes"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/privacy-scaling-explorations/sonobe/"

[dependencies]
ark-ec = { version = "0.5", features = ["parallel"] }
ark-ff = { version = "0.5", features = ["parallel", "asm"] }
ark-poly = { version = "0.5", features = ["parallel"] }
ark-std = { version = "0.5", features = ["parallel"] }
ark-crypto-primitives = { version = "0.5", features = ["constraints", "sponge", "crh", "parallel"] }
ark-poly-commit = { version = "0.5", features = ["parallel"] }
ark-relations = { version = "0.5" }
ark-r1cs-std = { version = "0.5", features = ["parallel"] }
ark-snark = { version = "0.5" }
ark-serialize = { version = "0.5" }
ark-groth16 = { version = "0.5", features = ["parallel"] }
ark-bn254 = { version = "0.5" }
ark-grumpkin = { version = "0.5" }
thiserror = "1.0"
rayon = "1"
num-bigint = "0.4.3"
num-integer = "0.1"
sha3 = "0.10"
log = "0.4"

[features]
default = ["parallel"]
parallel = []
light-test = []
