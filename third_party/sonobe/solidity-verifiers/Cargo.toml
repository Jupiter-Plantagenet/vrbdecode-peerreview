[package]
name = "solidity-verifiers"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/privacy-scaling-explorations/sonobe/"

[dependencies]
ark-ec = "0.5"
ark-ff = "0.5"
ark-groth16 = "0.5"
ark-bn254 = { version = "0.5", features = ["r1cs"] }
ark-poly-commit = "0.5"
ark-serialize = "0.5"
askama = { version = "0.12.0", default-features = false, features = ["config"] }
revm = { version = "19.5.0", default-features = false, features = ["std"] }
rust-crypto = "0.2"
num-bigint = "0.4.3"
folding-schemes = { path = "../folding-schemes" }

[features]
default = ["parallel"]
parallel = [
    "ark-groth16/parallel",
    "ark-poly-commit/parallel",
    "folding-schemes/parallel",
]

